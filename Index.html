<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Tree Theory — Tree Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #f5f4f0;
    --black: #1a1a18;
    --grey-light: #dddbd4;
    --grey-mid: #9e9c94;
    --grey-dark: #4a4a44;
    --accent: #c0392b;
    --bg: #f5f4f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--black);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; max-width: 680px; }
  .screen.active { display: block; }

  /* ── LANG SELECT ── */
  #screen-lang {
    text-align: center;
    padding: 80px 0;
  }
  #screen-lang .sigil {
    font-family: 'IM Fell English', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--grey-mid);
    text-transform: uppercase;
    margin-bottom: 60px;
  }
  #screen-lang h1 {
    font-family: 'IM Fell English', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  #screen-lang .sub {
    font-size: 11px;
    color: var(--grey-mid);
    letter-spacing: 0.15em;
    margin-bottom: 64px;
  }
  .lang-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .lang-btn {
    font-family: 'IM Fell English', serif;
    font-size: 16px;
    background: none;
    border: 1px solid var(--grey-light);
    color: var(--black);
    padding: 14px 32px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .lang-btn:hover {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }

  /* ── INTRO ── */
  #screen-intro { padding: 60px 0; }
  .intro-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--grey-mid);
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .intro-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 400;
    line-height: 1.35;
    margin-bottom: 32px;
  }
  .intro-body {
    font-size: 12px;
    line-height: 1.9;
    color: var(--grey-dark);
    max-width: 520px;
    margin-bottom: 48px;
  }
  .intro-body p + p { margin-top: 16px; }
  .intro-meta {
    display: flex;
    gap: 32px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }
  .meta-item {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--grey-mid);
    text-transform: uppercase;
  }
  .meta-item span {
    display: block;
    font-size: 13px;
    color: var(--black);
    letter-spacing: 0;
    margin-top: 4px;
    font-family: 'IM Fell English', serif;
  }
  .btn-primary {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--black);
    color: var(--white);
    border: none;
    padding: 16px 40px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.75; }

  /* ── QUESTION ── */
  #screen-question { padding: 40px 0; }
  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--grey-light);
  }
  .q-dim {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--grey-mid);
    text-transform: uppercase;
  }
  .q-counter {
    font-family: 'IM Fell English', serif;
    font-size: 13px;
    color: var(--grey-mid);
  }
  .q-progress-bar {
    width: 100%;
    height: 1px;
    background: var(--grey-light);
    margin-bottom: 48px;
    position: relative;
  }
  .q-progress-fill {
    height: 1px;
    background: var(--black);
    transition: width 0.4s ease;
  }
  .q-text {
    font-family: 'IM Fell English', serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .q-context {
    font-size: 11px;
    color: var(--grey-mid);
    font-style: italic;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  /* SCENARIO */
  .scenario-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .scenario-opt {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    background: none;
    border: 1px solid var(--grey-light);
    color: var(--black);
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .scenario-opt .opt-label {
    font-family: 'IM Fell English', serif;
    font-size: 13px;
    color: var(--grey-mid);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .scenario-opt:hover, .scenario-opt.selected {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }
  .scenario-opt:hover .opt-label, .scenario-opt.selected .opt-label {
    color: var(--grey-light);
  }

  /* SCALE */
  .scale-wrap { margin: 8px 0 32px; }
  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--grey-mid);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }
  .scale-buttons {
    display: flex;
    gap: 8px;
  }
  .scale-btn {
    flex: 1;
    aspect-ratio: 1;
    background: none;
    border: 1px solid var(--grey-light);
    font-family: 'IM Fell English', serif;
    font-size: 16px;
    color: var(--grey-mid);
    cursor: pointer;
    transition: all 0.15s;
    max-width: 60px;
  }
  .scale-btn:hover, .scale-btn.selected {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }

  /* WORD SELECT */
  .word-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 32px;
  }
  .word-chip {
    font-family: 'IM Fell English', serif;
    font-size: 14px;
    background: none;
    border: 1px solid var(--grey-light);
    color: var(--black);
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.15s;
    font-style: italic;
  }
  .word-chip:hover, .word-chip.selected {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }
  .word-instruction {
    font-size: 10px;
    color: var(--grey-mid);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* TEXT INPUT */
  .text-input-wrap { margin-bottom: 32px; }
  .text-input-field {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--grey-light);
    color: var(--black);
    padding: 12px 0;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
    resize: none;
  }
  .text-input-field:focus { border-bottom-color: var(--black); }
  .text-input-field::placeholder { color: var(--grey-mid); }

  .q-nav {
    display: flex;
    justify-content: flex-end;
    margin-top: 32px;
  }
  .btn-next {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--black);
    color: var(--black);
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.15s;
    opacity: 0.3;
    pointer-events: none;
  }
  .btn-next.enabled {
    opacity: 1;
    pointer-events: all;
  }
  .btn-next.enabled:hover {
    background: var(--black);
    color: var(--white);
  }

  /* ── RESULT ── */
  #screen-result { padding: 40px 0 80px; }
  .result-header {
    margin-bottom: 48px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--grey-light);
  }
  .result-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--grey-mid);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .result-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 400;
    line-height: 1.3;
  }

  .tree-canvas-wrap {
    margin: 0 auto 48px;
    display: flex;
    justify-content: center;
  }
  canvas#treeCanvas {
    border: 1px solid var(--grey-light);
    display: block;
  }

  .dimension-grid {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 48px;
  }
  .dim-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .dim-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .dim-name {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--grey-dark);
  }
  .dim-score-label {
    font-family: 'IM Fell English', serif;
    font-size: 13px;
    color: var(--grey-mid);
    font-style: italic;
  }
  .dim-bar-bg {
    height: 2px;
    background: var(--grey-light);
    width: 100%;
  }
  .dim-bar-fill {
    height: 2px;
    background: var(--black);
    transition: width 1.2s cubic-bezier(0.16,1,0.3,1);
  }
  .dim-desc {
    font-size: 11px;
    color: var(--grey-mid);
    line-height: 1.7;
    margin-top: 4px;
  }

  .result-summary {
    border: 1px solid var(--grey-light);
    padding: 28px;
    margin-bottom: 40px;
  }
  .summary-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--grey-mid);
    margin-bottom: 16px;
  }
  .summary-text {
    font-family: 'IM Fell English', serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--black);
  }

  .result-footer {
    font-size: 10px;
    color: var(--grey-mid);
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 2;
  }

  /* fade transition */
  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── OPENING SCENE ── */
  #screen-opening {
    text-align: center;
    padding: 80px 0;
    min-height: 60vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #screen-opening.active { display: flex; }
  .opening-line {
    font-family: 'IM Fell English', serif;
    font-size: clamp(13px, 2vw, 17px);
    color: var(--grey-dark);
    line-height: 2.2;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    font-style: italic;
    max-width: 480px;
  }
  .opening-line.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .opening-line.dim { color: var(--grey-mid); }
  .opening-skip {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--grey-mid);
    background: none;
    border: none;
    cursor: pointer;
    margin-top: 60px;
    opacity: 0;
    transition: opacity 0.6s ease, color 0.2s;
  }
  .opening-skip:hover { color: var(--black); }
  .opening-skip.visible { opacity: 1; }

  /* ── WEATHER CHECK ── */
  #screen-weather {
    text-align: center;
    padding: 80px 0;
  }
  .weather-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(20px, 3.5vw, 30px);
    font-weight: 400;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .weather-sub {
    font-size: 11px;
    color: var(--grey-mid);
    letter-spacing: 0.15em;
    margin-bottom: 56px;
    font-style: italic;
  }
  .weather-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto 48px;
    text-align: left;
  }
  .weather-opt {
    background: none;
    border: 1px solid var(--grey-light);
    padding: 18px 24px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .weather-opt:hover, .weather-opt.selected {
    border-color: var(--black);
    background: var(--black);
    color: var(--white);
  }
  .weather-icon {
    font-size: 22px;
    flex-shrink: 0;
    line-height: 1;
  }
  .weather-opt-body {}
  .weather-opt-name {
    font-family: 'IM Fell English', serif;
    font-size: 15px;
    display: block;
    margin-bottom: 3px;
  }
  .weather-opt-desc {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--grey-mid);
  }
  .weather-opt:hover .weather-opt-desc,
  .weather-opt.selected .weather-opt-desc { color: var(--grey-light); }
  .weather-note {
    font-size: 11px;
    color: var(--grey-mid);
    font-style: italic;
    line-height: 1.8;
    max-width: 400px;
    margin: 0 auto;
  }

  /* ── RESULT ACTIONS ── */
  .result-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .btn-action {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--black);
    color: var(--black);
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-action:hover {
    background: var(--black);
    color: var(--white);
  }

  /* ── RETAKE COMPARISON ── */
  .comparison-banner {
    border: 1px solid var(--grey-light);
    padding: 20px 24px;
    margin-bottom: 32px;
    background: none;
  }
  .comparison-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--grey-mid);
    margin-bottom: 14px;
  }
  .comparison-rows {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .comparison-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
  }
  .comparison-dim { color: var(--grey-dark); letter-spacing: 0.05em; }
  .comparison-delta {
    font-family: 'IM Fell English', serif;
    font-size: 13px;
    font-style: italic;
  }
  .delta-up { color: #2d6a4f; }
  .delta-down { color: #c0392b; }
  .delta-same { color: var(--grey-mid); }

  /* ── TRANSITION CARD ── */
  #screen-transition {
    text-align: center;
    padding: 120px 0;
  }
  #screen-transition .tr-text {
    font-family: 'IM Fell English', serif;
    font-size: 15px;
    color: var(--grey-mid);
    font-style: italic;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- OPENING -->
<div id="screen-opening" class="screen">
  <div id="opening-lines"></div>
  <button class="opening-skip" id="opening-skip" onclick="skipOpening()"></button>
</div>

<!-- WEATHER CHECK -->
<div id="screen-weather" class="screen">
  <p class="weather-title" id="weather-title"></p>
  <p class="weather-sub" id="weather-sub"></p>
  <div class="weather-options" id="weather-options"></div>
  <p class="weather-note" id="weather-note"></p>
</div>

<!-- LANG SELECT -->
<div id="screen-lang" class="screen active fade-in">
  <p class="sigil">Paper Tree Theory</p>
  <h1>Tree Assessment</h1>
  <p class="sub">ทฤษฎีต้นไม้กระดาษ · 2026</p>
  <div class="lang-buttons">
    <button class="lang-btn" onclick="selectLang('th')">ภาษาไทย</button>
    <button class="lang-btn" onclick="selectLang('en')">English</button>
    <button class="lang-btn" onclick="selectLang('ja')">日本語</button>
  </div>
</div>

<!-- INTRO -->
<div id="screen-intro" class="screen">
  <p class="intro-label" id="intro-label">Assessment</p>
  <h1 class="intro-title" id="intro-title"></h1>
  <div class="intro-body" id="intro-body"></div>
  <div class="intro-meta">
    <div class="meta-item" id="meta-questions"></div>
    <div class="meta-item" id="meta-time"></div>
    <div class="meta-item" id="meta-note"></div>
  </div>
  <button class="btn-primary" onclick="startAssessment()" id="btn-start"></button>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="q-header">
    <span class="q-dim" id="q-dim-label"></span>
    <span class="q-counter" id="q-counter"></span>
  </div>
  <div class="q-progress-bar">
    <div class="q-progress-fill" id="q-progress-fill"></div>
  </div>
  <p class="q-text" id="q-text"></p>
  <p class="q-context" id="q-context"></p>
  <div id="q-input-area"></div>
  <div class="q-nav">
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">
      <span id="btn-next-label">Next →</span>
    </button>
  </div>
</div>

<!-- TRANSITION -->
<div id="screen-transition" class="screen">
  <p class="tr-text" id="tr-text">Analyzing your tree...</p>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-header">
    <p class="result-label" id="res-label">Your Tree</p>
    <h2 class="result-title" id="res-title"></h2>
  </div>
  <div class="tree-canvas-wrap">
    <canvas id="treeCanvas" width="400" height="320"></canvas>
  </div>
  <div id="comparison-banner" class="comparison-banner" style="display:none">
    <p class="comparison-label" id="comparison-label"></p>
    <div class="comparison-rows" id="comparison-rows"></div>
  </div>
  <div class="dimension-grid" id="dimension-grid"></div>
  <div class="result-summary">
    <p class="summary-label" id="summary-label">Summary</p>
    <p class="summary-text" id="summary-text"></p>
  </div>
  <div class="result-actions">
    <button class="btn-action" id="btn-export" onclick="exportPNG()"></button>
    <button class="btn-action" id="btn-retake" onclick="retake()"></button>
  </div>
  <p class="result-footer" id="result-footer"></p>
</div>

<script>
// ══════════════════════════════════════════════
// COPY / i18n
// ══════════════════════════════════════════════
const COPY = {
  th: {
    introTitle: "คุณรู้จักต้นไม้ของตัวเองดีแค่ไหน",
    introBody: `<p>Paper Tree Theory เป็นกรอบแนวคิดที่มองจิตใจว่าเป็นต้นไม้ — มีอยู่ก่อนประสบการณ์ เติบโตผ่านการตีความ และได้รับอิทธิพลจากคนรอบข้าง</p><p>แบบประเมินนี้วัด 6 มิติของต้นไม้คุณ ได้แก่ สุขภาพตัวตน รูปแบบการตีความ ความหนาแน่นของ core beliefs สภาวะภายใน ความไวต่ออิทธิพลจากภายนอก และการจัดการกับประสบการณ์ที่ผ่านไป</p><p>ไม่มีคำตอบที่ถูกหรือผิด ตอบตามที่เป็นจริง ไม่ใช่ตามที่คิดว่าควรเป็น</p>`,
    metaQ: "คำถาม<span>18–22 ข้อ</span>",
    metaT: "เวลาโดยประมาณ<span>10–15 นาที</span>",
    metaN: "หมายเหตุ<span>คำถามปรับตามคำตอบ</span>",
    btnStart: "เริ่มประเมิน",
    btnNext: "ถัดไป →",
    btnFinish: "ดูผลลัพธ์",
    trText: "กำลังวิเคราะห์ต้นไม้ของคุณ...",
    resLabel: "ต้นไม้ของคุณ",

// NAVIGATION

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  el.classList.add('active');
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
}

function selectLang(l) {
  lang = l;
  showOpening();
}

// ── OPENING ──
function showOpening() {
  showScreen('opening');
  const lines = OPENING[lang];
  const container = document.getElementById('opening-lines');
  const skipBtn = document.getElementById('opening-skip');
  const skipLabels = { th: 'ข้ามไป', en: 'Skip', ja: 'スキップ' };
  skipBtn.textContent = skipLabels[lang];
  container.innerHTML = '';

  lines.forEach((text, i) => {
    const el = document.createElement('p');
    el.className = 'opening-line' + (i < lines.length - 1 ? ' dim' : '');
    el.textContent = text;
    container.appendChild(el);
  });

  let i = 0;
  const els = container.querySelectorAll('.opening-line');
  function revealNext() {
    if (i < els.length) {
      els[i].classList.add('visible');
      i++;
      setTimeout(revealNext, i < els.length ? 1100 : 600);
    } else {
      skipBtn.classList.add('visible');
      setTimeout(() => showWeather(), 2200);
    }
  }
  setTimeout(revealNext, 400);
}

function skipOpening() {
  showWeather();
}

// ── WEATHER CHECK ──
function showWeather() {
  const wc = WEATHER_COPY[lang];
  document.getElementById('weather-title').textContent = wc.title;
  document.getElementById('weather-sub').textContent = wc.sub;
  document.getElementById('weather-note').textContent = wc.note;

  const container = document.getElementById('weather-options');
  container.innerHTML = '';
  wc.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'weather-opt';
    btn.innerHTML = `
      <span class="weather-icon">${opt.icon}</span>
      <div class="weather-opt-body">
        <span class="weather-opt-name">${opt.name}</span>
        <span class="weather-opt-desc">${opt.desc}</span>
      </div>`;
    btn.onclick = () => {
      container.querySelectorAll('.weather-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      weatherMood = opt.mood;
      setTimeout(() => showIntro(), 500);
    };
    container.appendChild(btn);
  });

  showScreen('weather');
}

function showIntro() {
  const c = COPY[lang];
  document.getElementById('intro-title').textContent = c.introTitle;
  document.getElementById('intro-body').innerHTML = c.introBody;
  document.getElementById('meta-questions').innerHTML = c.metaQ;
  document.getElementById('meta-time').innerHTML = c.metaT;
  document.getElementById('meta-note').innerHTML = c.metaN;
  document.getElementById('btn-start').textContent = c.btnStart;
  showScreen('intro');
}

function startAssessment() {
  questions = QUESTIONS[lang];
  currentQ = 0;
  answers = {};
  scores = { tree: [], drawing: [], frame: [], weather: [], external: [], root: [] };
  treeSeed = Date.now();
  renderQuestion();
  showScreen('question');
}

function renderQuestion() {
  const q = questions[currentQ];
  const c = COPY[lang];
  currentAnswer = null;

  document.getElementById('q-dim-label').textContent = q.dim;
  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-context').textContent = q.context || '';

  const area = document.getElementById('q-input-area');
  area.innerHTML = '';

  const isLast = currentQ === questions.length - 1;
  const nextBtn = document.getElementById('btn-next');
  document.getElementById('btn-next-label').textContent = isLast ? c.btnFinish : c.btnNext;
  nextBtn.classList.remove('enabled');

  if (q.type === 'scale') {
    const wrap = document.createElement('div');
    wrap.className = 'scale-wrap';
    const labels = document.createElement('div');
    labels.className = 'scale-labels';
    labels.innerHTML = `<span>${q.scale[0]}</span><span>${q.scale[1]}</span>`;
    const btns = document.createElement('div');
    btns.className = 'scale-buttons';
    for (let i = 1; i <= 5; i++) {
      const b = document.createElement('button');
      b.className = 'scale-btn';
      b.textContent = i;
      b.onclick = () => {
        btns.querySelectorAll('.scale-btn').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        currentAnswer = i;
        nextBtn.classList.add('enabled');
      };
      btns.appendChild(b);
    }
    wrap.appendChild(labels);
    wrap.appendChild(btns);
    area.appendChild(wrap);
  } else if (q.type === 'scenario') {
    const wrap = document.createElement('div');
    wrap.className = 'scenario-options';
    q.options.forEach((opt, i) => {
      const b = document.createElement('button');
      b.className = 'scenario-opt';
      b.innerHTML = `<span class="opt-label">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
      b.onclick = () => {
        wrap.querySelectorAll('.scenario-opt').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        currentAnswer = { optionIndex: i, score: q.scores[i] };
        nextBtn.classList.add('enabled');
      };
      wrap.appendChild(b);
    });
    area.appendChild(wrap);
  } else if (q.type === 'words') {
    const instr = document.createElement('p');
    instr.className = 'word-instruction';
    instr.textContent = q.context;
    area.appendChild(instr);
    const grid = document.createElement('div');
    grid.className = 'word-grid';
    let selectedWords = [];
    q.words.forEach(word => {
      const b = document.createElement('button');
      b.className = 'word-chip';
      b.textContent = word;
      b.onclick = () => {
        b.classList.toggle('selected');
        if (b.classList.contains('selected')) {
          selectedWords.push(word);
        } else {
          selectedWords = selectedWords.filter(w => w !== word);
        }
        currentAnswer = selectedWords;
        nextBtn.classList.add('enabled');
      };
      grid.appendChild(b);
    });
    area.appendChild(grid);
    // words always enabled after render (can skip)
    nextBtn.classList.add('enabled');
    currentAnswer = [];
  } else if (q.type === 'text') {
    const wrap = document.createElement('div');
    wrap.className = 'text-input-wrap';
    const ta = document.createElement('textarea');
    ta.className = 'text-input-field';
    ta.rows = 3;
    ta.placeholder = q.placeholder;
    ta.oninput = () => {
      currentAnswer = ta.value;
      nextBtn.classList.add('enabled');
    };
    wrap.appendChild(ta);
    area.appendChild(wrap);
    nextBtn.classList.add('enabled');
    currentAnswer = '';
  }
}

function nextQuestion() {
  if (!document.getElementById('btn-next').classList.contains('enabled')) return;
  const q = questions[currentQ];
  answers[q.id] = currentAnswer;

  // score
  const dimKey = dimMap[q.dim] || 'tree';
  if (q.type === 'scale') {
    scores[dimKey].push(currentAnswer);
  } else if (q.type === 'scenario') {
    scores[dimKey].push(currentAnswer.score);
  } else if (q.type === 'words') {
    if (q.isFrame) {
      // more frames = less flexibility
      const count = Array.isArray(currentAnswer) ? currentAnswer.length : 0;
      scores[dimKey].push(Math.max(1, 5 - count));
    } else if (q.isExternal) {
      const count = Array.isArray(currentAnswer) ? currentAnswer.length : 0;
      const hasNone = Array.isArray(currentAnswer) && currentAnswer.some(w =>
        w === 'ไม่มีใครมีอิทธิพลมากพิเศษ' || w === 'No one has particular influence' || w === '特に影響を受ける人はいない'
      );
      scores[dimKey].push(hasNone ? 5 : Math.max(1, 5 - Math.floor(count / 2)));
    } else {
      if (!Array.isArray(currentAnswer)) { scores[dimKey].push(3); }
      else {
        const posWords = q.positiveWords || [];
        const posCount = currentAnswer.filter(w => posWords.includes(w)).length;
        scores[dimKey].push(posCount > 0 ? Math.min(5, 3 + posCount) : 3);
      }
    }
  } else if (q.type === 'text') {
    scores[dimKey].push(typeof currentAnswer === 'string' && currentAnswer.trim().length > 2 ? 4 : 3);
  }

  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showTransitionAndResult();
  }
}

// RESULT
// ══════════════════════════════════════════════
function avg(arr) {
  if (!arr.length) return 3;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function showTransitionAndResult() {
  document.getElementById('tr-text').textContent = COPY[lang].trText;
  showScreen('transition');
  setTimeout(() => {
    buildResult();
    showScreen('result');
    animateBars();
    drawTree();
  }, 2200);
}

  const c = COPY[lang];
  const dimScores = {
    tree: avg(scores.tree),

    frame: avg(scores.frame),
    weather: avg(scores.weather),

      root: s => s >= 4 ? "根はよく吸収しています。待っているものはほとんどありません。" : s >= 3 ? "ほとんどのことは通り過ぎましたが、まだ待っているものがあります。" : "いくつかの経験がまだ処理されていません——内側に留まっています。",

function exportPNG() {
  const canvas = document.getElementById('treeCanvas');

  // build export canvas with scores below tree
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = 500;
  exportCanvas.height = 520;
  const ctx = exportCanvas.getContext('2d');

  // bg
  ctx.fillStyle = '#f5f4f0';
  ctx.fillRect(0, 0, 500, 520);

  // draw tree centered
  ctx.drawImage(canvas, 50, 20, 400, 320);

  // divider
  ctx.strokeStyle = 'rgba(26,26,24,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(40, 355); ctx.lineTo(460, 355);
  ctx.stroke();

  // scores
  const d = window._dimScores;
  const keys = window._dimKeys || ['tree','drawing','frame','weather','external','root'];
  const names = window._dimNames || ['Self-Health','Interpretive Pattern','Core Belief Density','Internal Weather','External Influence','Root Absorption'];
  ctx.font = '10px "Space Mono", monospace';
  ctx.fillStyle = '#9e9c94';

  const colW = 210;
  keys.forEach((key, i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const x = 40 + col * colW;
    const y = 380 + row * 44;
    const score = d[key];

    ctx.fillStyle = '#9e9c94';
    ctx.font = '9px "Space Mono", monospace';
    ctx.fillText((names[i] || key).toUpperCase(), x, y);

    // bar
    ctx.fillStyle = '#dddbd4';
    ctx.fillRect(x, y + 8, colW - 20, 2);
    ctx.fillStyle = '#1a1a18';
    ctx.fillRect(x, y + 8, (score / 5) * (colW - 20), 2);
  });

  // footer
  ctx.fillStyle = '#9e9c94';
  ctx.font = '9px "Space Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Paper Tree Theory · ' + new Date().toLocaleDateString(), 250, 510);

  const link = document.createElement('a');
  link.download = 'my-tree.png';
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
}

function retake() {
  const banner = document.getElementById('comparison-banner');
  if (banner) banner.style.display = 'none';
  startAssessment();
  showScreen('question');
}

// ══════════════════════════════════════════════
// SEEDED RANDOM
// ══════════════════════════════════════════════
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

// ══════════════════════════════════════════════
// TREE DRAWING
// ══════════════════════════════════════════════
function drawTree() {
  const canvas = document.getElementById('treeCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const d = window._dimScores;
  const rng = seededRandom(treeSeed || 42);

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f5f4f0';
  ctx.fillRect(0, 0, W, H);

  const treeH = d.tree, drawH = d.drawing, frameH = d.frame,
        weatherH = d.weather, extH = d.external, rootH = d.root;

  const cx = W / 2, ground = H - 60;
  const trunkH = 70 + treeH * 10;
  const trunkW = 7 + treeH;
  const canopyR = 50 + treeH * 12;

  // Weather (bg atmosphere)
  if (weatherH < 3) {
    ctx.save();
    for (let i = 0; i < 18; i++) {
      ctx.beginPath();
      const x = rng() * W, y = rng() * (H * 0.6);
      ctx.moveTo(x, y); ctx.lineTo(x + 1, y + 8 + rng() * 10);
      ctx.strokeStyle = 'rgba(100,120,160,0.08)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.restore();
  }

  // Roots
  ctx.save();
  const rootCount = Math.round(rootH + 1);
  for (let i = 0; i < rootCount; i++) {
    const angle = (Math.PI / (rootCount + 1)) * (i + 1);
    const len = 20 + rootH * 8;
    ctx.beginPath();
    ctx.moveTo(cx, ground);
    ctx.quadraticCurveTo(
      cx + Math.cos(Math.PI + angle) * len * 0.5,
      ground + len * 0.4,
      cx + Math.cos(Math.PI + angle) * len,
      ground + len * 0.6
    );
    ctx.strokeStyle = `rgba(26,26,24,${0.3 + rootH * 0.08})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  ctx.restore();

  // Ground line
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - 80, ground); ctx.lineTo(cx + 80, ground);
  ctx.strokeStyle = 'rgba(26,26,24,0.15)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();

  // Trunk
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - trunkW/2, ground);
  ctx.lineTo(cx - trunkW/3, ground - trunkH);
  ctx.lineTo(cx + trunkW/3, ground - trunkH);
  ctx.lineTo(cx + trunkW/2, ground);
  ctx.closePath();
  ctx.strokeStyle = `rgba(26,26,24,${0.5 + treeH * 0.08})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // Branches
  const branchTop = ground - trunkH;
  function drawBranch(x, y, angle, len, depth) {
    if (depth === 0 || len < 5) return;
    const ex = x + Math.cos(angle) * len;
    const ey = y - Math.sin(angle) * len;
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(26,26,24,${0.3 + treeH * 0.07})`;
    ctx.lineWidth = Math.max(0.5, depth * 0.6);
    ctx.stroke();
    drawBranch(ex, ey, angle - 0.3 - (1-drawH)*0.2, len * 0.65, depth - 1);
    drawBranch(ex, ey, angle + 0.3 + (1-drawH)*0.2, len * 0.65, depth - 1);
  }
  ctx.save();
  drawBranch(cx, branchTop, Math.PI/2, 22 + treeH*3, 4);
  drawBranch(cx, branchTop - 10, Math.PI/2 - 0.5, 18 + treeH*2, 3);
  drawBranch(cx, branchTop - 10, Math.PI/2 + 0.5, 18 + treeH*2, 3);
  ctx.restore();

  // Canopy
  ctx.save();
  const canopyY = ground - trunkH - canopyR * 0.6;
  ctx.beginPath();
  ctx.arc(cx, canopyY, canopyR, 0, Math.PI * 2);
  const leafAlpha = 0.06 + treeH * 0.03;
  ctx.fillStyle = `rgba(26,26,24,${leafAlpha})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(26,26,24,${0.15 + treeH * 0.04})`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  // Frames on trunk
  if (frameH < 3.5) {
    const fCount = Math.round(5 - frameH);
    ctx.save();
    for (let i = 0; i < fCount; i++) {
      const fy = ground - 15 - i * 14;
      const fw = trunkW * 1.6 + i * 2;
      ctx.beginPath();
      ctx.rect(cx - fw/2, fy - 8, fw, 9);
      ctx.strokeStyle = 'rgba(26,26,24,0.25)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
    ctx.restore();
  }

  // Papers scattered around
  const paperCount = Math.round(weatherH < 3 ? 8 : 4);
  ctx.save();
  for (let i = 0; i < paperCount; i++) {
    const px = cx - 140 + rng() * 280;
    const py = ground - 20 - rng() * 80;
    const pw = 10 + rng() * 8;
    const ph = 13 + rng() * 8;
    const rot = (rng() - 0.5) * 1.2;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.rect(-pw/2, -ph/2, pw, ph);
    ctx.strokeStyle = 'rgba(26,26,24,0.12)';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // lines on paper
    for (let l = 0; l < 2; l++) {
      ctx.beginPath();
      ctx.moveTo(-pw/2 + 2, -ph/2 + 4 + l * 4);
      ctx.lineTo(pw/2 - 2, -ph/2 + 4 + l * 4);
      ctx.strokeStyle = 'rgba(26,26,24,0.07)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();

  // External influence arrows
  if (extH < 3) {
    ctx.save();
    for (let i = 0; i < 3; i++) {
      const ax = 20 + rng() * 60;
      const ay = ground - 60 - rng() * 80;
      ctx.beginPath();
      ctx.moveTo(ax, ay); ctx.lineTo(ax + 20, ay + 5);
      ctx.strokeStyle = 'rgba(26,26,24,0.1)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
    ctx.restore();
  }
}
